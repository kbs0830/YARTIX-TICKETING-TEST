services:
  - type: web
    name: yartix-main
    env: python
    buildCommand: pip install -r requirements.txt
    startCommand: gunicorn app:app
    plan: free
    envVars:
      - key: PYTHON_VERSION
        value: 3.14.0
      - key: GOOGLE_SHEET_NAME
        sync: false
      - key: GOOGLE_CREDENTIALS_JSON
        sync: false
