<!DOCTYPE html>
<html lang="zh-Hant">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1">
<title>Yang Art Ticket 青年藝文售票</title>

<link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet">
<link rel="stylesheet" href="/static/css/app.css?v=20260417-10">
</head>
<body>

<main class="page-wrap">
  <section id="heroSection" class="hero-card">
    <p class="eyebrow">Yang Art Ticket 青年藝文售票</p>
    <h1 class="main-title">🚂 2026.06.06「春映洄瀾，拾光」縱谷深度專列 ✕ 普悠瑪號 ✕ 景觀漫遊</h1>
    <div id="countdown" class="countdown-panel">載入中...</div>
    <p id="globalNotice" class="global-notice"></p>

    <div class="accessibility-toggle mb-3">
      <input class="form-check-input" type="checkbox" id="elderModeToggle">
      <label class="form-check-label" for="elderModeToggle">字體加大</label>
    </div>

    <div id="launcher" class="launcher hidden-ui">
      <label for="countInput" class="form-label">報名人數 (1-10)</label>
      <input id="countInput" type="number" min="1" max="10" value="1" class="form-control form-control-lg" required>

      <details id="policyDrawer" class="policy-drawer mt-3 mb-3">
        <summary>🚂 活動完整公告資訊（點擊展開）</summary>
        <div id="policyContent" class="policy-content" data-loaded="0">
          <p class="mb-0">正在載入公告內容...</p>
        </div>
      </details>

      <div class="form-check mt-2 mb-3">
        <input class="form-check-input" type="checkbox" id="agree" required disabled>
        <label class="form-check-label" for="agree">我已詳閱並同意活動規範與退費條款</label>
        <p id="agreeReadHint" class="field-hint mt-1 mb-0">請先展開上方公告並捲動閱讀到底，才可勾選同意。</p>
      </div>

      <button id="startBtn" class="btn btn-ticket w-100">開始填寫報名資料</button>
      <p id="launcherMessage" class="submit-message"></p>
    </div>
  </section>

  <section id="formSection" class="form-shell hidden-ui">
    <div class="section-head">
      <h2>報名資料</h2>
      <p>每位參加者分為 3 個步驟；若為多人報名，系統會一次顯示一位，填完再切換下一位。</p>
    </div>

    <div id="participantPager" class="participant-pager hidden-ui" aria-live="polite">
      <button id="prevParticipantBtn" type="button" class="btn btn-secondary">上一位</button>
      <p id="participantProgress" class="participant-progress mb-0">第 1 位，共 1 位</p>
      <button id="nextParticipantBtn" type="button" class="btn btn-primary">下一位</button>
    </div>

    <div id="participantsContainer"></div>

    <div class="submit-bar hidden-ui">
      <button id="submitBtn" class="btn btn-submit w-100">送出報名</button>
      <p id="submitMessage" class="submit-message"></p>
    </div>
  </section>

  <section id="confirmSection" class="confirm-shell hidden-ui">
    <h2>報名成功</h2>
    <p id="confirmCount"></p>
    <ul id="bankInfoList" class="bank-list"></ul>
    <div class="table-responsive">
      <table class="table table-striped table-bordered align-middle text-center" id="summaryTable">
        <thead>
          <tr>
            <th>姓名</th>
            <th>票種</th>
            <th>金額</th>
            <th>悠遊卡明細</th>
            <th>Email</th>
            <th>報名序號</th>
          </tr>
        </thead>
        <tbody></tbody>
      </table>
    </div>
    <a id="lineLink" class="btn btn-line" target="_blank" rel="noreferrer">加入 LINE 群組</a>
  </section>
</main>

<script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/js/bootstrap.bundle.min.js"></script>
<script src="/static/js/app.js?v=20260417-9"></script>
</body>
</html>
